# LLM Configuration
llm:
  provider: "gemini"
  model: "gemini-1.5-flash"
  # api_key: will be loaded from env var GOOGLE_API_KEY

# Email Configuration
email:
  sender: "henry.hyunwookim@gmail.com"
  recipient: "henry.hyunwookim@gmail.com"
  smtp_server: "smtp.gmail.com"
  smtp_port: 587
  # password: will be loaded from env var SMTP_PASSWORD

# Monitoring Configuration
sites:
  - url: "https://af.net/featured/"
    name: "AF Featured"
  - url: "https://af.net/insights/"
    name: "AF Insights"
  - url: "https://af.net/top-stories/"
    name: "AF Top Stories"
  - url: "https://af.net/voices/"
    name: "AF Voices"
    type: "video" # Hint for fetcher to look for different metadata if needed
  - url: "https://af.net/news/"
    name: "AF News"

# System
# For Cloud Run (using bucket from deploy.ps1):
storage_file: "gs://serp-425005-monitor-data/history.json"
# storage_file: "data/history.json"
diff_threshold: 10 # Minimum number of new characters/words to trigger summary
