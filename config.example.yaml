# LLM Configuration
llm:
  provider: "gemini"
  model: "gemini-2.5-flash"
  # api_key: will be loaded from env var GOOGLE_API_KEY

# Email Configuration
email:
  sender: "your-email@gmail.com"
  recipient: "recipient@example.com"
  smtp_server: "smtp.gmail.com"
  smtp_port: 587
  # password: will be loaded from env var SMTP_PASSWORD

# Monitoring Configuration
sites:
  - url: "https://example.com/news/"
    name: "Example News"
  - url: "https://techblog.com/"
    name: "Generic Tech Blog"
    type: "video" # Hint for fetcher to look for different metadata if needed

# System
# For local run:
storage_file: "data/history.json"
# For Cloud Run (Required):
# storage_file: "gs://your-bucket-name/history.json"
diff_threshold: 10 # Minimum number of new characters/words to trigger summary
